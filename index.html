<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; background: #f8fafc; }
  input[type="date"] { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STATUS_OPTIONS = ["Applied", "Interview", "Accepted", "Rejected"];
const STATUS_STYLES = {
  Applied: "bg-slate-100 text-slate-700 border-slate-300",
  Interview: "bg-amber-50 text-amber-700 border-amber-300",
  Accepted: "bg-emerald-50 text-emerald-700 border-emerald-300",
  Rejected: "bg-rose-50 text-rose-700 border-rose-300",
};

const STORAGE_KEY = "job-tracker-entries";

function newRow(serial) {
  return {
    id: `row_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
    serial, company: "", role: "", link: "", dateApplied: "",
    resumeSubmitted: false, followUp: "", status: "Applied", notes: "",
  };
}

function loadRows() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.length) return parsed;
    }
  } catch (e) {}
  return [newRow(1)];
}

function TrashIcon() {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="3 6 5 6 21 6"></polyline>
      <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path>
      <path d="M10 11v6"></path><path d="M14 11v6"></path>
      <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
    </svg>
  );
}
function PlusIcon() {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  );
}
function LinkIcon() {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
      <polyline points="15 3 21 3 21 9"></polyline>
      <line x1="10" y1="14" x2="21" y2="3"></line>
    </svg>
  );
}

function JobApplicationTracker() {
  const [rows, setRows] = useState(loadRows);
  const [savedFlash, setSavedFlash] = useState(false);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      setSavedFlash(true);
      const t = setTimeout(() => setSavedFlash(false), 600);
      return () => clearTimeout(t);
    } catch (e) {}
  }, [rows]);

  const updateField = (id, field, value) => {
    setRows(prev => prev.map(r => r.id === id ? { ...r, [field]: value } : r));
  };

  const addRow = () => {
    setRows(prev => {
      const nextSerial = prev.length ? Math.max(...prev.map(r => Number(r.serial) || 0)) + 1 : 1;
      return [...prev, newRow(nextSerial)];
    });
  };

  const deleteRow = (id) => {
    setRows(prev => prev.filter(r => r.id !== id).map((r, i) => ({ ...r, serial: i + 1 })));
  };

  return (
    <div className="w-full min-h-screen bg-slate-50 p-4 sm:p-6">
      <div className="max-w-7xl mx-auto">
        <div className="flex items-center justify-between mb-1">
          <h1 className="text-xl sm:text-2xl font-semibold text-slate-900">Job Application Tracker</h1>
          <div className="text-xs text-slate-400 h-4">{savedFlash ? "Saved" : ""}</div>
        </div>
        <p className="text-sm text-slate-500 mb-5">
          {rows.length} application{rows.length !== 1 ? "s" : ""} tracked. Saved automatically to this browser/device.
        </p>

        <div className="bg-white rounded-lg border border-slate-200 overflow-x-auto shadow-sm">
          <table className="w-full text-sm border-collapse min-w-[1100px]">
            <thead>
              <tr className="bg-slate-100 text-slate-600 text-xs uppercase tracking-wide">
                <th className="px-3 py-2 text-left font-medium w-12">#</th>
                <th className="px-3 py-2 text-left font-medium min-w-[140px]">Company</th>
                <th className="px-3 py-2 text-left font-medium min-w-[140px]">Role</th>
                <th className="px-3 py-2 text-left font-medium min-w-[100px]">Job link</th>
                <th className="px-3 py-2 text-left font-medium w-36">Date applied</th>
                <th className="px-3 py-2 text-center font-medium w-24">Resume</th>
                <th className="px-3 py-2 text-left font-medium w-36">Follow up</th>
                <th className="px-3 py-2 text-left font-medium w-32">Status</th>
                <th className="px-3 py-2 text-left font-medium min-w-[180px]">Notes</th>
                <th className="px-3 py-2 w-10"></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(row => (
                <tr key={row.id} className="border-t border-slate-100 hover:bg-slate-50/60 align-top">
                  <td className="px-3 py-2 text-slate-500">{row.serial}</td>
                  <td className="px-2 py-1.5">
                    <input type="text" value={row.company} onChange={e => updateField(row.id, "company", e.target.value)}
                      placeholder="Acme Inc" className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent" />
                  </td>
                  <td className="px-2 py-1.5">
                    <input type="text" value={row.role} onChange={e => updateField(row.id, "role", e.target.value)}
                      placeholder="Software engineer" className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent" />
                  </td>
                  <td className="px-2 py-1.5">
                    <div className="flex items-center gap-1">
                      <input type="text" value={row.link} onChange={e => updateField(row.id, "link", e.target.value)}
                        placeholder="https://..." className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent" />
                      {row.link && (
                        <a href={row.link.startsWith("http") ? row.link : `https://${row.link}`} target="_blank" rel="noopener noreferrer"
                          className="text-slate-400 hover:text-slate-600 shrink-0" title="Open link">
                          <LinkIcon />
                        </a>
                      )}
                    </div>
                  </td>
                  <td className="px-2 py-1.5">
                    <input type="date" value={row.dateApplied} onChange={e => updateField(row.id, "dateApplied", e.target.value)}
                      className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent text-slate-700" />
                  </td>
                  <td className="px-2 py-1.5 text-center">
                    <input type="checkbox" checked={row.resumeSubmitted} onChange={e => updateField(row.id, "resumeSubmitted", e.target.checked)}
                      className="w-4 h-4 accent-slate-700 cursor-pointer" />
                  </td>
                  <td className="px-2 py-1.5">
                    <input type="date" value={row.followUp} onChange={e => updateField(row.id, "followUp", e.target.value)}
                      className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent text-slate-700" />
                  </td>
                  <td className="px-2 py-1.5">
                    <select value={row.status} onChange={e => updateField(row.id, "status", e.target.value)}
                      className={`w-full px-2 py-1.5 rounded border text-xs font-medium focus:outline-none cursor-pointer ${STATUS_STYLES[row.status]}`}>
                      {STATUS_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                  </td>
                  <td className="px-2 py-1.5">
                    <input type="text" value={row.notes} onChange={e => updateField(row.id, "notes", e.target.value)}
                      placeholder="Add a note" className="w-full px-2 py-1.5 rounded border border-transparent hover:border-slate-200 focus:border-slate-400 focus:outline-none bg-transparent" />
                  </td>
                  <td className="px-2 py-1.5 text-center">
                    <button onClick={() => deleteRow(row.id)} className="text-slate-300 hover:text-rose-500 transition-colors" title="Delete row">
                      <TrashIcon />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <button onClick={addRow}
          className="mt-4 flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-slate-900 px-3 py-2 rounded-md border border-slate-200 bg-white hover:bg-slate-50 shadow-sm transition-colors">
          <PlusIcon /> Add application
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JobApplicationTracker />);
</script>
</body>
</html>
